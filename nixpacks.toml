[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@9 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @workspace/guest-pro build",
  "pnpm --filter @workspace/api-server build"
]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
